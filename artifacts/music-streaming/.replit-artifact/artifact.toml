kind = "web"
previewPath = "/"
title = "Music Streaming"
version = "1.0.0"
id = "artifacts/music-streaming"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20181

[services.development]
run = "pnpm --filter @workspace/music-streaming run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/music-streaming", "run", "build" ]
publicDir = "artifacts/music-streaming/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20181"
BASE_PATH = "/"
